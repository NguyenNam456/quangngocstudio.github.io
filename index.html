<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quang Ngọc Wedding</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:#333;
}

header {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#fff;
}

.menu a {
  margin:0 10px;
  text-decoration:none;
  color:#333;
}

.hero {
  height:90vh;
  background:url('https://images.unsplash.com/photo-1520857014576-2c4f4c972b57') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
}

.hero h1 {
  font-size:40px;
}

.btn {
  padding:12px 25px;
  background:#b56576;
  color:#fff;
  text-decoration:none;
  border-radius:5px;
}

.gallery {
  display:flex;
  flex-wrap:wrap;
  padding:20px;
}

.gallery img {
  width:23%;
  margin:1%;
  border-radius:8px;
}

footer {
  text-align:center;
  padding:20px;
  background:#facdcd;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <h2>Quang Ngọc Wedding</h2>
  <div class="menu">
    <a href="#">Trang chủ</a>
    <a href="#">Album</a>
    <a href="#">Liên hệ</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Ghi dấu khoảnh khắc yêu thương</h1>
    <a class="btn">Xem Album</a>
  </div>
</section>

<section class="gallery">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
  <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
  <img src="https://images.unsplash.com/photo-1529634892379-a3c00b5c3d2b">
  <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc">
</section>

<footer>
  © 2026 Quang Ngọc Wedding
</footer>

</body>
</html>
