<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quang Ngọc Wedding Studio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fafafa;
      color: #333;
    }

    header {
      background: url('https://images.unsplash.com/photo-1529636798458-92182e662485') center/cover;
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    header h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 30px;
      background: #e91e63;
      color: white;
      text-decoration: none;
      border-radius: 30px;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
    }

    .price-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin: 10px;
      display: inline-block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    footer {
      background: #000;
      color: white;
      padding: 30px;
    }
  </style>
</head>

<body>

<header>
  <div>
    <h1>Quang Ngọc Wedding</h1>
    <p>Lưu giữ khoảnh khắc đẹp nhất của bạn</p>
    <a class="btn" href="https://facebook.com" target="_blank">Inbox ngay</a>
  </div>
</header>

<section>
  <h2>Album nổi bật</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
  </div>
</section>

<section>
  <h2>Bảng giá</h2>
  <div class="price-box">
    <h3>Gói Basic</h3>
    <p>3.000.000đ</p>
  </div>
  <div class="price-box">
    <h3>Gói Premium</h3>
    <p>6.000.000đ</p>
  </div>
</section>

<section>
  <h2>Khách hàng nói gì</h2>
  <p>"Ảnh rất đẹp, tự nhiên, đúng cảm xúc"</p>
</section>

<footer>
  <p>© Quang Ngọc Wedding Studio</p>
</footer>

</body>
</html>
